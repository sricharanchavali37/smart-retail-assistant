name: Smart Retail Assistant CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
	run: |
          python -m pip install --upgrade pip
          pip install fastapi==0.111.0 "uvicorn[standard]" python-multipart pydantic python-dotenv httpx pytest pytest-asyncio
          pip install xgboost scikit-learn pandas numpy joblib
          pip install langchain langchain-openai langchain-community openai
          pip install faiss-cpu sentence-transformers
          pip install azure-storage-blob azure-search-documents azure-core
          pip install "starlette==0.46.0"
	
        

      - name: Run Phase 1 ML training
        run: python backend/ml/run_phase1.py

      - name: Run tests
        run: pytest backend/tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: sricharanchavali37/smart-retail-assistant:latest